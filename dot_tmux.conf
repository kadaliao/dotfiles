set -g default-command /opt/homebrew/bin/fish
set -g default-shell /opt/homebrew/bin/fish

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Terminal type configuration
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -sg escape-time 30


# theme
# set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin "arcticicestudio/nord-tmux"
# set -g @plugin 'egel/tmux-onedark'

set -g allow-passthrough on

# 允许 tmux 动态修改外层终端（Ghostty）的窗口/标签页标题
set-option -g set-titles on

# 配置标题的显示格式
# #S 表示 session name
# 如果你也想加上当前窗口名称，可以写成 "#S / #W"
set-option -g set-titles-string "#S"

# 启用鼠标
set -g mouse on

# 禁止进程改窗口名
set -g allow-rename off

# 复制模式（选择模式）中的默认键盘布局模仿vi
set -g mode-keys vi

# 恢复环境
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on' #恢复面板内容
set -g @resurrect-strategy-vim 'session' #恢复vim会话状态

# 复制到剪贴板
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @shell_mode 'vi' #兼容shell的vi模式

# URL-VIEW
set -g @plugin 'tmux-plugins/tmux-urlview'

# session utility
# set -g @plugin 'tmux-plugins/tmux-sessionist'

# tmux日志
# prefix-shift+p 开始/停止日志记录
set -g @plugin 'tmux-plugins/tmux-logging' 

# set -g @plugin 'christoomey/vim-tmux-navigator'
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
# 从1开始计数window和pane
set -g base-index 1
setw -g pane-base-index 1

# 自动给窗口重新编号
set -g renumber-windows on

# vim 方式的移动窗口
bind-key h if-shell "$is_vim" "send-keys M-h"  "select-pane -L"
bind-key j if-shell "$is_vim" "send-keys M-j"  "select-pane -D"
bind-key k if-shell "$is_vim" "send-keys M-k"  "select-pane -U"
bind-key l if-shell "$is_vim" "send-keys M-l"  "select-pane -R"

# vim 方式的移动窗口并且缩放
bind-key C-h if-shell "$is_vim" "send-keys M-h"  "select-pane -L\; resize-pane -Z"
bind-key C-j if-shell "$is_vim" "send-keys M-j"  "select-pane -D\; resize-pane -Z"
bind-key C-k if-shell "$is_vim" "send-keys M-k"  "select-pane -U\; resize-pane -Z"
bind-key C-l if-shell "$is_vim" "send-keys M-l"  "select-pane -R\; resize-pane -Z"

# 因为 l 占用了选择最后一个窗口的功能，使用 e 映射成最后一个窗口
# 使用 C-e 映射成最后一个 panel
bind-key e last
bind-key C-e lastp

# 使用当前路径分割窗口
bind c new-window      -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"


# Startup on tmux 3.6a emits noisy "job error" records for any run-shell during
# config load, even when the command succeeds. Keep TPM metadata for manual
# install/update bindings, but load the current plugin behavior statically.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# tmux-sensible defaults used by this setup.
set -g history-limit 50000
set -g display-time 4000
set -g status-keys emacs
set -g focus-events on
setw -g aggressive-resize on
bind-key C-p previous-window
bind-key C-n next-window
bind-key R source-file ~/.tmux.conf \; display-message 'Sourced ~/.tmux.conf!'

# nord-tmux theme.
set-environment -g NORD_TMUX_STATUS_TIME_FORMAT "%H:%M"
set-environment -g NORD_TMUX_STATUS_DATE_FORMAT "%Y-%m-%d"
source-file "$HOME/.tmux/plugins/nord-tmux/src/nord.conf"
source-file "$HOME/.tmux/plugins/nord-tmux/src/nord-status-content.conf"
set -g status-interval 5
set -g status-right-length 110
set -g status-right '#{?client_prefix,#[fg=brightcyan,bg=black,nobold,noitalics,nounderscore]#[fg=black,bg=brightcyan,bold] PREFIX ,}#(~/.config/tmux/status/right.sh)'

# TPM management stays available on demand.
bind-key I run-shell "$HOME/.tmux/plugins/tpm/bindings/install_plugins"
bind-key U run-shell "$HOME/.tmux/plugins/tpm/bindings/update_plugins"
bind-key M-u run-shell "$HOME/.tmux/plugins/tpm/bindings/clean_plugins"

# tmux-resurrect.
bind-key C-s run-shell "$HOME/.tmux/plugins/tmux-resurrect/scripts/save.sh"
bind-key C-r run-shell "$HOME/.tmux/plugins/tmux-resurrect/scripts/restore.sh"
set-option -gq @resurrect-strategy-irb "default_strategy"
set-option -gq @resurrect-strategy-mosh-client "default_strategy"
set-option -gq @resurrect-save-script-path "$HOME/.tmux/plugins/tmux-resurrect/scripts/save.sh"
set-option -gq @resurrect-restore-script-path "$HOME/.tmux/plugins/tmux-resurrect/scripts/restore.sh"

# tmux-yank.
bind-key y run-shell -b "$HOME/.tmux/plugins/tmux-yank/scripts/copy_line.sh"
bind-key Y run-shell -b "$HOME/.tmux/plugins/tmux-yank/scripts/copy_pane_pwd.sh"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "tmux paste-buffer -p"
bind-key -T copy-mode-vi M-y send-keys -X copy-pipe-and-cancel "pbcopy; tmux paste-buffer -p"
bind-key -T copy-mode-vi "!" send-keys -X copy-pipe-and-cancel "tr -d '\n' | pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode Y send-keys -X copy-pipe-and-cancel "tmux paste-buffer -p"
bind-key -T copy-mode M-y send-keys -X copy-pipe-and-cancel "pbcopy; tmux paste-buffer -p"
bind-key -T copy-mode "!" send-keys -X copy-pipe-and-cancel "tr -d '\n' | pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# tmux-urlview.
bind-key u capture-pane -J \; \
  save-buffer "/tmp/tmux-buffer" \; \
  delete-buffer \; \
  split-window -l 10 "urlview /tmp/tmux-buffer"

# tmux-logging.
bind-key P run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"
bind-key M-p run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/screen_capture.sh"
bind-key M-P run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/save_complete_history.sh"
bind-key M-c run-shell "$HOME/.tmux/plugins/tmux-logging/scripts/clear_history.sh"

# Disabled for now: this powerline integration is emitting repeated tmux status-job
# errors under tmux 3.6a, which is a likely cause of the long-running instability.
# set-environment -g PYTHONPATH "$HOME/.config/powerline/segments:$PYTHONPATH"
# run-shell "powerline-config tmux setup"
# run-shell "powerline-daemon -q"
