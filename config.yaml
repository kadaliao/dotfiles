config:
  backup: true
  create: true
  dotpath: dotfiles
dotfiles:
  d_fish:
    dst: ~/.config/fish
    src: config/fish
  f_ankdown-conf.yaml:
    dst: ~/.ankdown-conf.yaml
    src: ankdown-conf.yaml
  f_tmux.conf:
    dst: ~/.tmux.conf
    src: tmux.conf
  d_powerline:
    src: config/powerline
    dst: ~/.config/powerline
  f_init.vim:
    src: config/nvim/init.vim
    dst: ~/.config/nvim/init.vim
  f_rc.conf:
    src: config/ranger/rc.conf
    dst: ~/.config/ranger/rc.conf
  f_commands.py:
    src: config/ranger/commands.py
    dst: ~/.config/ranger/commands.py
  f_devicons.py:
    src: config/ranger/plugins/devicons.py
    dst: ~/.config/ranger/plugins/devicons.py
  f_devicons_linemode.py:
    src: config/ranger/plugins/devicons_linemode.py
    dst: ~/.config/ranger/plugins/devicons_linemode.py
  f_autojump.py:
    src: config/ranger/plugins/autojump.py
    dst: ~/.config/ranger/plugins/autojump.py
  f_ripgreprc:
    src: ripgreprc
    dst: ~/.ripgreprc
  f_pomo_normal.aac:
    src: Applications/TickTick.app/Contents/Resources/pomo_normal.aac
    dst: /Applications/TickTick.app/Contents/Resources/pomo_normal.aac
  f_hmscreens:
    src: bin/hmscreens
    dst: ~/bin/hmscreens
  f_smp.py:
    src: bin/smp.py
    dst: ~/bin/smp.py
profiles:
  liaoxingyi-mbp13-dbfm:
    dotfiles:
    - f_tmux.conf
    - f_ankdown-conf.yaml
    - d_fish
    - d_powerline
    - f_init.vim
    - f_rc.conf
    - f_commands.py
    - f_devicons.py
    - f_devicons_linemode.py
    - f_autojump.py
    - f_ripgreprc
    - f_pomo_normal.aac
    - f_hmscreens
    - f_smp.py
