config:
  backup: true
  create: true
  dotpath: dotfiles
dotfiles:
  d_fish:
    dst: ~/.config/fish
    src: config/fish
  f_ankdown-conf.yaml:
    dst: ~/.ankdown-conf.yaml
    src: ankdown-conf.yaml
  f_tmux.conf:
    dst: ~/.tmux.conf
    src: tmux.conf
  f_vimrc:
    dst: ~/.vim/vimrc
    src: vim/vimrc
  d_powerline:
    src: config/powerline
    dst: ~/.config/powerline
  f_config:
    src: usr/local/etc/privoxy/config
    dst: /usr/local/etc/privoxy/config
  f_init.vim:
    src: config/nvim/init.vim
    dst: ~/.config/nvim/init.vim
profiles:
  liaoxingyi-mbp13-dbfm:
    dotfiles:
    - f_vimrc
    - f_tmux.conf
    - f_ankdown-conf.yaml
    - d_fish
    - d_powerline
    - f_config
    - f_init.vim
